# 풀스택 셀프호스트/데모: 앱 + Postgres + Keycloak + MCP 를 한 번에 띄운다.
#   docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
#
# ⚠ 보안: 아래 기본값은 로컬 데모용이다(약한 비밀번호). 반드시 .env.prod 를 채워 덮어쓸 것.
#   - AUTH_SECRET 은 필수(미설정 시 기동 거부). POSTGRES/KEYCLOAK 비밀번호는 강한 값으로 교체.
#   - 번들 Keycloak은 start-dev(비운영). 실서비스는 deploy/ 의 Helm + 외부 Keycloak(프로덕션 모드) 사용.
#   - postgres 포트는 호스트에 노출하지 않는다(컨테이너 네트워크 내부 전용).
#
# 브라우저 로그인 리다이렉트를 위해 호스트에 아래 한 줄이 필요하다(issuer 호스트 공유):
#   127.0.0.1 keycloak
# (앱 컨테이너는 도커 DNS로 keycloak을 찾고, 브라우저는 hosts 항목으로 찾는다)
name: simple-wiki

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wiki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wiki}
      POSTGRES_DB: ${POSTGRES_DB:-wiki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wiki} -d ${POSTGRES_DB:-wiki}"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  # 마이그레이션 1회 실행(앱 이미지 재사용). 성공 후 종료된다.
  migrate:
    build:
      context: .
    image: simple-wiki:latest
    command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-wiki}@postgres:5432/${POSTGRES_DB:-wiki}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
    image: simple-wiki:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wiki}:${POSTGRES_PASSWORD:-wiki}@postgres:5432/${POSTGRES_DB:-wiki}
      AUTH_SECRET: ${AUTH_SECRET:?AUTH_SECRET를 설정하세요(openssl rand -base64 32)}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_KEYCLOAK_ID: ${AUTH_KEYCLOAK_ID:-simple-wiki-app}
      AUTH_KEYCLOAK_SECRET: ${AUTH_KEYCLOAK_SECRET:-dev-only-secret}
      AUTH_KEYCLOAK_ISSUER: ${AUTH_KEYCLOAK_ISSUER:-http://keycloak:8080/realms/simple-wiki}
      ATTACHMENTS_DIR: /data/attachments
    volumes:
      - attachments:/data/attachments
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  # 원격 MCP(streamable-http). 조직 LLM이 각자 PAT로 붙는다.
  mcp:
    build:
      context: ./mcp-server
    image: simple-wiki-mcp:latest
    restart: unless-stopped
    environment:
      WIKI_BASE_URL: http://app:3000
      HOST: 0.0.0.0
      PORT: "3333"
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-}
    ports:
      - "${MCP_PORT:-3333}:3333"
    depends_on:
      app:
        condition: service_started

volumes:
  pgdata:
  attachments:
