{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "simple-wiki.mcpName" . }}
  labels:
    {{- include "simple-wiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: {{ .Values.mcp.service.type }}
  selector:
    {{- include "simple-wiki.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  ports:
    - name: http
      port: {{ .Values.mcp.service.port }}
      targetPort: http
{{- end }}
