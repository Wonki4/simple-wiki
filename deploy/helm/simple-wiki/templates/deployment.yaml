apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "simple-wiki.appServiceName" . }}
  labels:
    {{- include "simple-wiki.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.app.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "simple-wiki.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "simple-wiki.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
      {{- with .Values.app.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "simple-wiki.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.migrations.enabled }}
      initContainers:
        # prisma migrate deploy — Secret이 일반 리소스로 존재하는 상태에서 실행되므로
        # Helm hook의 secret 순서 문제를 피한다. migrate deploy는 멱등적이다.
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "node_modules/prisma/build/index.js", "migrate", "deploy"]
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "simple-wiki.secretName" . }}
                  key: {{ .Values.secrets.keys.databaseUrl }}
      {{- end }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
          env:
            {{- include "simple-wiki.appEnv" . | nindent 12 }}
          {{- if or (and .Values.persistence.enabled (eq .Values.storage.driver "local")) .Values.config.keycloakCA }}
          volumeMounts:
            {{- if and .Values.persistence.enabled (eq .Values.storage.driver "local") }}
            - name: attachments
              mountPath: {{ .Values.config.attachmentsDir }}
            {{- end }}
            {{- if .Values.config.keycloakCA }}
            - name: keycloak-ca
              mountPath: /etc/ssl/keycloak-ca
              readOnly: true
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
      {{- if or (and .Values.persistence.enabled (eq .Values.storage.driver "local")) .Values.config.keycloakCA }}
      volumes:
        {{- if and .Values.persistence.enabled (eq .Values.storage.driver "local") }}
        - name: attachments
          persistentVolumeClaim:
            claimName: {{ include "simple-wiki.fullname" . }}-attachments
        {{- end }}
        {{- if .Values.config.keycloakCA }}
        - name: keycloak-ca
          configMap:
            name: {{ include "simple-wiki.fullname" . }}-keycloak-ca
        {{- end }}
      {{- end }}
      {{- with .Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
