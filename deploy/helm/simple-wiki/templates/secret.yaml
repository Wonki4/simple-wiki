{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "simple-wiki.fullname" . }}
  labels:
    {{- include "simple-wiki.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.keys.authSecret }}: {{ required "secrets.authSecret is required when secrets.create=true (openssl rand -base64 32), or set secrets.existingSecret" .Values.secrets.authSecret | quote }}
  {{ .Values.secrets.keys.databaseUrl }}: {{ required "secrets.databaseUrl is required" .Values.secrets.databaseUrl | quote }}
  {{ .Values.secrets.keys.keycloakSecret }}: {{ required "secrets.keycloakSecret is required" .Values.secrets.keycloakSecret | quote }}
{{- end }}
