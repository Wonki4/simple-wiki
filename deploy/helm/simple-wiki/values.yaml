# simple-wiki Helm 값. Postgres·Keycloak은 외부(관리형/기존) 사용을 전제한다.
nameOverride: ""
fullnameOverride: ""

image:
  repository: simple-wiki
  tag: "latest"
  pullPolicy: IfNotPresent
imagePullSecrets: []

app:
  replicaCount: 1
  podAnnotations: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: wiki.example.com
  tls:
    enabled: false
    secretName: ""

# 비밀 아닌 앱 설정
config:
  # Auth.js가 사용하는 앱의 공개 URL
  authUrl: "https://wiki.example.com"
  keycloakId: "simple-wiki-app"
  # 외부 Keycloak realm issuer (브라우저·서버 모두 접근 가능한 URL)
  keycloakIssuer: "https://auth.example.com/realms/simple-wiki"
  # Keycloak이 내부/사설 CA 인증서를 쓰면 그 CA 체인(PEM)을 여기에 넣는다.
  # 차트가 ConfigMap으로 만들어 앱 파드에 마운트하고 NODE_EXTRA_CA_CERTS로 등록한다
  # (Node는 OS 신뢰 저장소를 읽지 않으므로 노드에 CA를 깔아도 소용없다).
  # keycloakCA: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----
  keycloakCA: ""
  # 지정 시 이 그룹(전체 경로) 소속 사용자도 전역 관리자 (realm 역할 wiki-admin과 병행).
  # 역할 클레임을 못 내려주는 IdP 연계 환경에서 사용. 예: "/wiki-admins"
  adminGroup: ""
  attachmentsDir: "/data/attachments"

# 비밀값. 운영은 existingSecret 권장(외부 시크릿 관리와 연동).
secrets:
  create: true
  existingSecret: ""        # 지정 시 차트는 Secret을 만들지 않고 이 이름을 참조
  # 아래 3개는 필수(비우면 helm install이 required로 실패 — 안전한 기본값 없음).
  # 운영은 secrets.create=false + existingSecret 권장.
  authSecret: ""            # openssl rand -base64 32
  # ── DB 커넥션 사이징 (스케일링) ──
  # DATABASE_URL 시크릿 값 끝에 ?connection_limit=<N> 을 붙여 replica당 커넥션 상한을 고정한다.
  #   예: postgresql://user:pass@host:5432/wiki?connection_limit=5
  # Postgres max_connections 는 (autoscaling.maxReplicas × connection_limit + 여유) 이상으로 사이징한다.
  #   예: maxReplicas 10 × 5 + mcp/마이그레이션/관리 여유 → max_connections=150~200
  # replica를 20~30 이상으로 키우거나 서버리스를 도입하면 그때 PgBouncer(transaction pooling)를 검토한다.
  databaseUrl: ""           # 외부 Postgres 접속 URL (예: postgresql://user:pass@host:5432/wiki)
  keycloakSecret: ""        # 외부 Keycloak client 시크릿
  # storage.driver=s3일 때만 필수
  s3AccessKeyId: ""
  s3SecretAccessKey: ""
  keys:                     # Secret 안의 키 이름(existingSecret도 동일 키를 가져야 함)
    authSecret: AUTH_SECRET
    databaseUrl: DATABASE_URL
    keycloakSecret: AUTH_KEYCLOAK_SECRET
    s3AccessKeyId: S3_ACCESS_KEY_ID
    s3SecretAccessKey: S3_SECRET_ACCESS_KEY

# 첨부 저장 드라이버. local=PVC 디스크(기본), s3=사내 S3 호환 오브젝트 스토리지.
# s3를 쓰면 PVC가 필요 없어져 app.replicaCount>1 수평 확장이 가능해진다.
# 자격증명(S3_ACCESS_KEY_ID/S3_SECRET_ACCESS_KEY)은 secrets 쪽에서 설정한다.
storage:
  driver: local
  s3:
    endpoint: ""            # 예: https://s3.corp.example.com
    bucket: ""
    region: us-east-1       # 호환 스토리지 관례 기본값
    forcePathStyle: true

# 첨부파일 디스크 저장 — storage.driver=local일 때만 사용된다.
# local + replicaCount>1 이면 accessMode를 ReadWriteMany로. (s3 드라이버면 PVC 자체가 생성되지 않음)
persistence:
  enabled: true
  size: 5Gi
  storageClass: ""
  accessMode: ReadWriteOnce

# 배포 전에 prisma migrate deploy 실행(Helm pre-install/pre-upgrade Job)
migrations:
  enabled: true

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 75

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop: ["ALL"]

# 원격 MCP 서버(streamable-http). 각 LLM이 자기 PAT를 헤더로 붙여 인증.
mcp:
  enabled: true
  image:
    repository: simple-wiki-mcp
    tag: "latest"
    pullPolicy: IfNotPresent
  replicaCount: 1
  # mcp-server는 무상태(stateless streamable-http)라 수평 확장 가능.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 75
  wikiBaseUrl: ""           # 비우면 클러스터 내부 앱 서비스로 자동 연결
  allowedHosts: ""          # DNS 리바인딩 보호(쉼표구분 Host). 공개 노출 시 권장.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  service:
    type: ClusterIP
    port: 80
    targetPort: 3333
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: mcp.example.com
    tls:
      enabled: false
      secretName: ""
